name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        # continue-on-error: Homebrew tap push may fail (e.g., expired token)
        # but the GitHub release with binaries should still be published.
        continue-on-error: true
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Verify release assets were uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length')
          if [ "$ASSET_COUNT" -lt 1 ]; then
            echo "::error::GitHub release $TAG has no uploaded assets"
            exit 1
          fi
          echo "Release $TAG has $ASSET_COUNT assets uploaded"
          gh release view "$TAG" --json assets --jq '.assets[].name'
